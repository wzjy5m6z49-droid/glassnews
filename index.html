<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Glass News Test</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <filter id="liquidGlassFilter">
    <feTurbulence
      type="fractalNoise"
      baseFrequency="0.018 0.028"
      numOctaves="2"
      seed="8"
      result="noise"
    />

    <feDisplacementMap
      in="SourceGraphic"
      in2="noise"
      scale="6"
      xChannelSelector="R"
      yChannelSelector="G"
    />
  </filter>
</svg>
  <div id="app"></div>

  <script>
    const latest = document.createElement('script');

    latest.src =
      'https://digitalgojp.sharepoint.com/sites/NTA_IBHub12/SiteAssets/news/latest-news.js?v='
      + Date.now();

    latest.onload = () => {

      const data = document.createElement('script');

      data.src =
        'https://digitalgojp.sharepoint.com/sites/NTA_IBHub12/SiteAssets/news/'
        + window.latestNewsFile
        + '?v=' + Date.now();

      data.onload = () => {

        const app = document.createElement('script');

        app.src =
          './app.js?v=' + Date.now();

        document.body.appendChild(app);

      };

      data.onerror = () => {
        document.getElementById('app').textContent =
          '表示不可';
      };

      document.body.appendChild(data);

    };

    latest.onerror = () => {
      document.getElementById('app').textContent =
        '読み込めませんでした';
    };

    document.body.appendChild(latest);
  </script>

</body>
</html>
